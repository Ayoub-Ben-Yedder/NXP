<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NXP Robot – Custom Base + Ackermann</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #0a0a0a;
    color: #fff;
    font-family: 'Segoe UI', sans-serif;
    padding: 20px;
    min-height: 100vh;
    overflow-y: hidden;
  }

  header {
    text-align: center;
    margin-bottom: 30px;
    padding-bottom: 20px;
    border-bottom: 2px solid #333;
  }

  h1 {
    font-size: 28px;
    margin-bottom: 5px;
  }

  .main-container {
    max-width: 1400px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 30px;
  }

  .section {
    display: flex;
    flex-direction: column;
    gap: 15px;
  }

  .left-panel {
    grid-column: 1;
  }

  .right-panel {
    grid-column: 2;
  }

  .canvas-wrapper {
    background: #1e1e1e;
    border: 2px solid #444;
    border-radius: 8px;
    padding: 15px;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  canvas {
    background: #0d0d0d;
    border-radius: 4px;
    display: block;
  }

  #robotCanvas {
    width: 100%;
    max-width: 600px;
    height: auto;
    aspect-ratio: 1;
  }

  #arrowCanvas {
    width: 150px;
    height: 150px;
  }

  .control-group {
    background: #1e1e1e;
    border: 2px solid #444;
    border-radius: 8px;
    padding: 15px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .controls-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
  }

  .control-group label {
    font-weight: 600;
    font-size: 14px;
    color: #aaa;
  }

  .slider-container {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  input[type="range"] {
    flex: 1;
    cursor: pointer;
    height: 6px;
    border-radius: 3px;
    background: #333;
    outline: none;
    -webkit-appearance: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #0078d4;
    cursor: pointer;
    transition: background 0.2s;
  }

  input[type="range"]::-webkit-slider-thumb:hover {
    background: #109eff;
  }

  input[type="range"]::-moz-range-thumb {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #0078d4;
    cursor: pointer;
    border: none;
    transition: background 0.2s;
  }

  input[type="range"]::-moz-range-thumb:hover {
    background: #109eff;
  }

  #angleDisplay {
    color: #0078d4;
    font-weight: bold;
    min-width: 50px;
    text-align: right;
  }

  #joystick {
    width: 100%;
    height: 200px;
    background: #111;
    border: 2px solid #444;
    border-radius: 8px;
    position: relative;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .button-group {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }

  button {
    flex: 1;
    background: #1e1e1e;
    color: #fff;
    border: 2px solid #444;
    border-radius: 6px;
    padding: 10px 15px;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
    transition: all 0.2s;
  }

  button:hover {
    background: #2a2a2a;
    border-color: #666;
  }

  button.active {
    background: #0078d4;
    border-color: #0078d4;
    color: #fff;
  }

  input[type="text"] {
    width: 100%;
    padding: 10px 12px;
    background: #1e1e1e;
    color: #fff;
    border: 2px solid #444;
    border-radius: 6px;
    font-size: 14px;
    transition: all 0.2s;
  }

  input[type="text"]:focus {
    outline: none;
    border-color: #0078d4;
    background: #252525;
  }

  input[type="text"]::placeholder {
    color: #666;
  }

  #terminal {
    width: 100%;
    height: 250px;
    background: #000;
    color: #0f0;
    font-family: 'Courier New', monospace;
    padding: 12px;
    overflow-y: auto;
    border: 2px solid #444;
    border-radius: 8px;
    font-size: 12px;
    line-height: 1.5;
  }

  #terminal::-webkit-scrollbar {
    width: 8px;
  }

  #terminal::-webkit-scrollbar-track {
    background: #000;
  }

  #terminal::-webkit-scrollbar-thumb {
    background: #444;
    border-radius: 4px;
  }

  #terminal::-webkit-scrollbar-thumb:hover {
    background: #666;
  }



  @media (max-width: 1024px) {
    .main-container {
      grid-template-columns: 1fr;
    }

    .left-panel, .right-panel {
      grid-column: 1;
    }
  }
</style>
</head>
<body>

<div class="main-container">
  <!-- Left Panel: Robot Visualization -->
  <div class="left-panel section">
    <div class="canvas-wrapper">
      <canvas id="robotCanvas" width="600" height="600"></canvas>
    </div>
    
    <div class="button-group">
      <button id="modeBtn">Automatic Mode</button>
    </div>
  </div>

  <!-- Right Panel: Controls & Terminal -->
  <div class="right-panel section">
    <div class="controls-row">
      <div class="control-group">
        <label>Rotation Indicator: (x0,y0) → (x1,y1)</label>
        <div style="display: flex; justify-content: center;">
          <canvas id="arrowCanvas" width="150" height="150"></canvas>
        </div>
      </div>

      <div class="control-group">
        <label>Joystick Control</label>
        <div id="joystick"></div>
      </div>
    </div>

    <div class="control-group">
      <label for="commandInput">Command Input</label>
      <input type="text" id="commandInput" placeholder="Enter command and press Enter">
    </div>

    <div class="control-group">
      <label>Terminal Output</label>
      <div id="terminal"></div>
    </div>
  </div>
</div>

<!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.0/nipplejs.min.js"></script>
<script>
// === Robot Canvas ===
const robotCanvas = document.getElementById("robotCanvas");
const rCtx = robotCanvas.getContext("2d");
const cx = robotCanvas.width / 2;
const cy = robotCanvas.height / 2;

const wheelBase = 320;
const trackWidth = 280;
const wheelWidth = 26;
const wheelHeight = 100;

let steerInput = 0;
const chassis = new Image();
chassis.src = "car.svg";

function drawWheel(x, y, angle = 0) {
  rCtx.save();
  rCtx.translate(x, y);
  rCtx.rotate(angle);
  rCtx.fillStyle = "#333";
  rCtx.fillRect(-wheelWidth/2, -wheelHeight/2, wheelWidth, wheelHeight);
  rCtx.restore();
}

function drawRobot(steerInputRad) {
  rCtx.clearRect(0, 0, robotCanvas.width, robotCanvas.height);
  rCtx.save();
  rCtx.translate(cx, cy);

  const rearAxleY = wheelBase / 2;
  const frontAxleY = -wheelBase / 2;

  let steerRad = steerInputRad;
  if (Math.abs(steerRad) < 0.001) steerRad = 0.001;
  const R = wheelBase / Math.tan(steerRad);
  const leftAngle  = Math.atan(wheelBase / (R - trackWidth/2));
  const rightAngle = Math.atan(wheelBase / (R + trackWidth/2));

  const scale = 0.6;
  const imgW = chassis.width * scale;
  const imgH = chassis.height * scale;
  rCtx.filter = "invert(1)";
  rCtx.drawImage(chassis, -imgW/2, -imgH/2, imgW, imgH);

  drawWheel(-trackWidth/2 - 8, rearAxleY, 0);
  drawWheel(trackWidth/2 + 8, rearAxleY, 0);
  drawWheel(-trackWidth/2 + 2, frontAxleY + 40, leftAngle);
  drawWheel(trackWidth/2 - 2, frontAxleY + 40, rightAngle);

  rCtx.restore();
}

function animateRobot() {
  if (chassis.complete) drawRobot(steerInput);
  requestAnimationFrame(animateRobot);
}
animateRobot();

// === Arrow Canvas ===
const arrowCanvas = document.getElementById("arrowCanvas");
const aCtx = arrowCanvas.getContext("2d");

function drawArrow() {
  aCtx.clearRect(0, 0, arrowCanvas.width, arrowCanvas.height);
  
  // Define start point (x0, y0) and end point (x1, y1)
  const x0 = 75, y0 = 120;
  const x1 = 75, y1 = 30;
  
  // Draw line from (x0, y0) to (x1, y1)
  aCtx.strokeStyle = "#0078d4";
  aCtx.lineWidth = 2;
  aCtx.beginPath();
  aCtx.moveTo(x0, y0);
  aCtx.lineTo(x1, y1);
  aCtx.stroke();
  
  // Draw arrowhead at (x1, y1)
  const headlen = 12;
  const angle = Math.atan2(y1 - y0, x1 - x0);
  
  aCtx.fillStyle = "#0078d4";
  aCtx.beginPath();
  aCtx.moveTo(x1, y1);
  aCtx.lineTo(x1 - headlen * Math.cos(angle - Math.PI / 6), y1 - headlen * Math.sin(angle - Math.PI / 6));
  aCtx.lineTo(x1 - headlen * Math.cos(angle + Math.PI / 6), y1 - headlen * Math.sin(angle + Math.PI / 6));
  aCtx.closePath();
  aCtx.fill();
  
  requestAnimationFrame(drawArrow);
}
drawArrow();

// === Terminal ===
const terminal = document.getElementById("terminal");
function logMessage(msg) {
  const timestamp = new Date().toLocaleTimeString();
  terminal.innerHTML += `[${timestamp}] ${msg}<br>`;
  terminal.scrollTop = terminal.scrollHeight;
}

// Example messages
logMessage("System initialized");
logMessage("Waiting for commands...");

setInterval(() => logMessage("✓ Robot status OK"), 3000);

// === Mode Button ===
const modeBtn = document.getElementById("modeBtn");
let automatic = true;
modeBtn.addEventListener("click", () => {
  automatic = !automatic;
  modeBtn.textContent = automatic ? "Automatic Mode" : "Manual Mode";
  modeBtn.classList.toggle("active", !automatic);
  logMessage(`📌 Mode changed to ${automatic ? "Automatic" : "Manual"}`);
});

// === Command Input ===
const commandInput = document.getElementById("commandInput");
commandInput.addEventListener("keypress", (e) => {
  if(e.key === "Enter") {
    const cmd = commandInput.value.trim();
    if(cmd) {
      logMessage(`→ Command: ${cmd}`);
      commandInput.value = "";
    }
  }
});

// === Joystick ===
const joystick = nipplejs.create({
  zone: document.getElementById('joystick'),
  mode: 'static',
  position: { left: '50%', top: '50%' },
  color: '#0078d4',
  restOpacity: 0.5,
});

joystick.on('move', (evt, data) => {
  if(data && data.vector) {
    const x = data.vector.x.toFixed(2);
    const y = data.vector.y.toFixed(2);
    // Optional: uncomment to log joystick movements
    // logMessage(`🕹️ Joy: x=${x}, y=${y}`);
  }
});

joystick.on('end', () => {
  logMessage("🕹️ Joystick released");
});
</script>

</body>
</html>
